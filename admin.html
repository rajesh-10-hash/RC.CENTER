<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — RC Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-tabs {
      display: flex; gap: .5rem; margin-bottom: 2rem;
      border-bottom: 1px solid var(--border); padding-bottom: 1rem;
    }
    .tab-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: .6rem 1.4rem;
      border-radius: 99px; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .88rem;
      transition: background .2s, color .2s, border-color .2s;
    }
    .tab-btn.active,
    .tab-btn:hover {
      background: var(--saffron); color: var(--dark);
      border-color: var(--saffron);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<div class="page-content">
<section class="auth-section" style="align-items:flex-start;padding-top:6rem;">
  <div class="auth-box" style="max-width:520px;">

    <div class="auth-logo">
      <img src="images/logo.png" onerror="this.style.display='none'">
      <h2>RC Center Admin</h2>
      <p>Manage Festivals & Reels</p>
    </div>

    <!-- TABS -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('festival',this)">🎊 Festival</button>
      <button class="tab-btn" onclick="switchTab('reel',this)">🎬 Reel</button>
    </div>

    <!-- FESTIVAL TAB -->
    <div class="tab-panel active" id="festivalTab">
      <div class="admin-section">
        <h3>Add Festival Year</h3>
        <div class="form-group">
          <label class="form-label">Year</label>
          <input type="text" id="year" class="rc-input" placeholder="e.g. 2025">
        </div>
        <div class="form-group">
          <label class="form-label">Festival Title</label>
          <input type="text" id="title" class="rc-input" placeholder="e.g. Vinayaka Chavithi 2025">
        </div>
        <div class="form-group">
          <label class="form-label">Instagram Link</label>
          <input type="text" id="instagram" class="rc-input" placeholder="Instagram profile/post link">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="description" class="rc-input" placeholder="Short festival description..."></textarea>
        </div>
        <button class="btn-full" onclick="saveFestival()">Save Festival →</button>
      </div>
    </div>

    <!-- REEL TAB -->
    <div class="tab-panel" id="reelTab">
      <div class="admin-section">
        <h3>Add Instagram Reel</h3>
        <div class="form-group">
          <label class="form-label">Year (e.g. 2025)</label>
          <input type="text" id="reelYear" class="rc-input" placeholder="2025">
        </div>
        <div class="form-group">
          <label class="form-label">Reel Caption</label>
          <input type="text" id="caption" class="rc-input" placeholder="Caption for this reel">
        </div>
        <div class="form-group">
          <label class="form-label">Instagram Reel Link</label>
          <input type="text" id="reelLink" class="rc-input" placeholder="https://www.instagram.com/reel/...">
        </div>
        <button class="btn-full" onclick="addReel()">Add Reel →</button>
      </div>
    </div>

    <p id="message" class="form-msg" style="margin-top:1rem;"></p>

    <button onclick="logout()" style="width:100%;margin-top:1.5rem;background:transparent;border:1px solid #f87171;color:#f87171;padding:.8rem;border-radius:99px;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;transition:.2s;" onmouseover="this.style.background='rgba(248,113,113,.1)'" onmouseout="this.style.background='transparent'">
      Logout
    </button>

  </div>
</section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/admin.js"></script>
<script>
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'Tab').classList.add('active');
    btn.classList.add('active');
  }
</script>
</body>
</html>
