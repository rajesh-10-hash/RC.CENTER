 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Photos — RC Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── GRID ── */
    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }

    /* ── CARD ── */
    .group-card {
      border-radius: 20px; overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(255,140,0,.18);
      transition: transform .25s, box-shadow .25s, border-color .25s;
      cursor: pointer;
    }
    .group-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 30px rgba(255,140,0,.35);
      border-color: rgba(255,140,0,.5);
    }
    .group-card img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
      transition: transform .4s ease;
    }
    .group-card:hover img { transform: scale(1.04); }
    .group-card-body {
      padding: 1rem 1.2rem 1.3rem;
      border-top: 1px solid rgba(255,140,0,.1);
    }
    .group-caption {
      font-size: .98rem; font-weight: 700;
      color: #fff; margin-bottom: .4rem;
      display: flex; align-items: flex-start; gap: .5rem;
    }
    .group-caption-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--saffron); flex-shrink: 0; margin-top: .45rem;
    }
    .group-year-tag {
      display: inline-flex; align-items: center; gap: .3rem;
      background: rgba(255,140,0,.1); border: 1px solid rgba(255,140,0,.2);
      color: var(--saffron); font-size: .72rem; font-weight: 700;
      padding: .2rem .7rem; border-radius: 99px;
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: .6rem;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92);
      align-items: center; justify-content: center;
      padding: 2rem;
      flex-direction: column;
      gap: 1rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 80vh;
      border-radius: 16px;
      border: 1px solid rgba(255,140,0,.3);
      object-fit: contain;
      box-shadow: 0 0 60px rgba(255,140,0,.2);
    }
    .lightbox-caption {
      color: #fff; font-size: 1rem; font-weight: 700;
      text-align: center; max-width: 600px;
    }
    .lightbox-year {
      color: var(--saffron); font-size: .8rem;
      font-weight: 600; text-align: center;
    }
    .lightbox-close {
      position: fixed; top: 1.5rem; right: 1.5rem;
      background: rgba(255,140,0,.2); border: 1px solid rgba(255,140,0,.4);
      color: #fff; width: 44px; height: 44px; border-radius: 50%;
      font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox-close:hover { background: var(--saffron); color: var(--dark); }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.6); border: 1px solid rgba(255,140,0,.3);
      color: var(--saffron); width: 50px; height: 50px; border-radius: 50%;
      font-size: 1.5rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox-nav:hover { background: rgba(255,140,0,.25); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    /* ── FILTER TABS ── */
    .year-filters {
      display: flex; gap: .5rem; flex-wrap: wrap;
      justify-content: center; margin-top: 2rem;
    }
    .year-filter-btn {
      background: var(--dark3); border: 1px solid var(--border);
      color: var(--muted); padding: .45rem 1.1rem;
      border-radius: 99px; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem;
      transition: background .2s, color .2s, border-color .2s;
    }
    .year-filter-btn.active,
    .year-filter-btn:hover {
      background: var(--saffron); color: var(--dark); border-color: var(--saffron);
    }
  </style>
</head>
<body>

<!-- FIREBASE FIRST -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<div class="page-content">

  <!-- INNER HERO -->
  <section class="inner-hero">
    <div class="hero-badge">✦ RC Center Family</div>
    <h1 class="hero-title">Group <span class="highlight">Photos</span></h1>
    <p class="hero-sub" style="margin:1rem auto 0;max-width:500px;">
      Our community together — cherished group memories from every Vinayaka Chavithi celebration since 2000.
    </p>
  </section>

  <!-- PHOTOS SECTION -->
  <section style="padding:4rem 5%;">
    <div style="max-width:1100px;margin:0 auto;">

      <!-- YEAR FILTER BUTTONS -->
      <div class="year-filters" id="yearFilters">
        <button class="year-filter-btn active" onclick="filterYear('all', this)">All Years</button>
      </div>

      <!-- LOADING -->
      <div id="loadingState" style="text-align:center;padding:4rem;color:var(--muted);">
        <div style="font-size:2.5rem;margin-bottom:1rem;">👥</div>
        <p>Loading group photos...</p>
      </div>

      <!-- GRID -->
      <div id="groupGrid" class="group-grid" style="display:none;"></div>

      <!-- EMPTY -->
      <div id="emptyState" style="display:none;text-align:center;padding:4rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">📸</div>
        <h3 style="font-family:'Cinzel',serif;color:var(--saffron);margin-bottom:.8rem;">No Group Photos Yet</h3>
        <p style="color:var(--muted);">Upload group photos from the Admin panel to show them here.</p>
        <a href="admin.html" class="btn-saffron" style="display:inline-flex;margin-top:1.5rem;">Go to Admin →</a>
      </div>

    </div>
  </section>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">›</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
  <div class="lightbox-year" id="lightboxYear"></div>
</div>

<script src="js/ui.js"></script>
<script>
  rcNavbar('group.html');
  rcFooter();

  const db = firebase.firestore();
  let allPhotos = [];
  let filteredPhotos = [];
  let currentLightbox = 0;
  let years = new Set();

  // Load all group photos from all years
  db.collection('years').orderBy(firebase.firestore.FieldPath.documentId(), 'desc').get()
    .then(async yearsSnap => {
      const promises = yearsSnap.docs.map(yearDoc => {
        return db.collection('years').doc(yearDoc.id)
          .collection('posts')
          .where('type', '==', 'group')
          .orderBy('createdAt', 'desc')
          .get()
          .then(postsSnap => {
            postsSnap.forEach(doc => {
              allPhotos.push({ ...doc.data(), year: yearDoc.id });
              years.add(yearDoc.id);
            });
          }).catch(() => {});
      });

      await Promise.all(promises);

      document.getElementById('loadingState').style.display = 'none';

      if (allPhotos.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      // Build year filter buttons
      const filtersDiv = document.getElementById('yearFilters');
      [...years].sort((a,b) => b - a).forEach(year => {
        const btn = document.createElement('button');
        btn.className = 'year-filter-btn';
        btn.textContent = year;
        btn.onclick = () => filterYear(year, btn);
        filtersDiv.appendChild(btn);
      });

      filteredPhotos = [...allPhotos];
      renderGrid(filteredPhotos);
    })
    .catch(err => {
      document.getElementById('loadingState').innerHTML =
        `<p style="color:#f87171;">Failed to load. Check Firebase config.</p>`;
      console.error(err);
    });

  function renderGrid(photos) {
    const grid = document.getElementById('groupGrid');
    grid.style.display = photos.length ? 'grid' : 'none';
    document.getElementById('emptyState').style.display = photos.length ? 'none' : 'block';

    grid.innerHTML = '';
    photos.forEach((photo, i) => {
      const card = document.createElement('div');
      card.className = 'group-card fade-in';
      card.innerHTML = `
        <img src="${photo.image}" alt="${photo.caption}" loading="lazy">
        <div class="group-card-body">
          <div class="group-year-tag">👥 ${photo.year}</div>
          <div class="group-caption">
            <span class="group-caption-dot"></span>
            ${photo.caption}
          </div>
        </div>`;
      card.onclick = () => openLightbox(i);
      grid.appendChild(card);
    });

    // Fade-in observer
    setTimeout(() => {
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
          });
        }, { threshold: 0.08 });
        obs.observe(el);
      });
    }, 100);
  }

  function filterYear(year, btn) {
    document.querySelectorAll('.year-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filteredPhotos = year === 'all' ? [...allPhotos] : allPhotos.filter(p => p.year === year);
    renderGrid(filteredPhotos);
  }

  /* ── LIGHTBOX ── */
  function openLightbox(index) {
    currentLightbox = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function updateLightbox() {
    const photo = filteredPhotos[currentLightbox];
    document.getElementById('lightboxImg').src = photo.image;
    document.getElementById('lightboxCaption').textContent = photo.caption;
    document.getElementById('lightboxYear').textContent = `📅 ${photo.year} Celebrations`;
  }
  function lightboxNav(dir) {
    currentLightbox = (currentLightbox + dir + filteredPhotos.length) % filteredPhotos.length;
    updateLightbox();
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowRight') lightboxNav(1);
    if (e.key === 'ArrowLeft')  lightboxNav(-1);
    if (e.key === 'Escape')     closeLightboxBtn();
  });
</script>
</body>
</html>
