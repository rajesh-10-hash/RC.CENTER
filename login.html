<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — RC Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-content">
<section class="auth-section">
  <div class="auth-box">

    <div class="auth-logo">
      <img src="images/logo.png" onerror="this.style.display='none'">
      <h2>RC Center</h2>
      <p>Admin Login</p>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="rc-input" placeholder="admin@rccenter.com">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="rc-input" placeholder="••••••••">
    </div>

    <button class="btn-full" onclick="login()">Login to Admin →</button>

    <p id="message" class="form-msg error"></p>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="index.html" style="color:var(--muted);font-size:.85rem;text-decoration:none;">← Back to Website</a>
    </div>

  </div>
</section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/login.js"></script>
</body>
</html>
