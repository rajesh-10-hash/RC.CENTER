 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — RC Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-content">

  <!-- INNER HERO -->
  <section class="inner-hero">
    <div class="hero-badge">✦ Festival Journey</div>
    <h1 class="hero-title">RC Center <span class="highlight">Celebrations</span></h1>
    <p class="hero-sub" style="margin:1rem auto 0;max-width:520px;">
      Explore our festival memories year by year — photos, reels, and moments that define us.
    </p>
  </section>

  <!-- GALLERY YEARS -->
  <section style="padding:5rem 5%;">
    <div style="max-width:1100px;margin:0 auto;">

      <div style="text-align:center;margin-bottom:1rem;">
        <div class="section-tag">Year by Year</div>
        <h2 class="section-title">Choose a <span class="accent">Celebration Year</span></h2>
        <div class="saffron-divider" style="margin:1rem auto;"></div>
      </div>

      <!-- Loading state -->
      <div id="loadingState" style="text-align:center;padding:4rem;color:var(--muted);">
        <div style="font-size:2rem;margin-bottom:1rem;">⏳</div>
        <p>Loading celebrations...</p>
      </div>

      <div id="years" class="year-grid" style="display:none;"></div>

    </div>
  </section>

  

  <!-- Repeat for other years -->

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- Firebase Config & Modules -->
<script src="js/firebase-config.js"></script>
<script src="js/firebase-db.js"></script>
<script src="js/ui.js"></script>
<script>
  rcNavbar('gallery.html');
  rcFooter();

  // Load celebration years from Firestore
  async function loadYears() {
    const result = await getYearsSummary();
    const yearsDiv = document.getElementById('years');
    const loadingState = document.getElementById('loadingState');

    if (!result.success) {
      loadingState.innerHTML = `<p style="color:#f87171;">❌ Failed to load data: ${result.error}</p>`;
      return;
    }

    if (!result.years || result.years.length === 0) {
      loadingState.innerHTML = `<div class="empty-state">🎊 No celebration years added yet. Check back soon!</div>`;
      return;
    }

    loadingState.style.display = 'none';
    yearsDiv.style.display = 'grid';

    result.years.forEach(yearInfo => {
      yearsDiv.innerHTML += `
        <div class="year-card fade-in" onclick="location.href='year.html?year=${yearInfo.id}'">
          <div class="year-num">${yearInfo.id}</div>
          <p>${yearInfo.title || 'Vinayaka Chavithi'}</p>
        </div>`;
    });

    // Trigger fade-in animation
    setTimeout(() => {
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.1 });
        obs.observe(el);
      });
    }, 100);
  }

  // Load years on page load
  window.addEventListener('load', loadYears);
</script>
</body>
</html>
